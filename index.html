<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./img/pokeball.png?v=2">
    <script src="./script.js" defer></script>
</head>
<body onload="init()">

  
    <header>
        <div class="logo">
            <img src="./img/pokeball.png" alt="Logo" width="30px">
            <h1>Pokédex</h1>
        </div>
        <div class="search_container">
            <input data-id="search-input" type="text" placeholder="Search Pokémon...">
            <button data-id="search-button" onclick="searchPokemon()">Search</button>
        </div>
    </header>

  
    <main id="content">
    </main>

    
    <div class="load_more_container">
        <button data-id="load-more-button" onclick="loadMore()">Load More</button>
    </div>

    
</body>
</html>
